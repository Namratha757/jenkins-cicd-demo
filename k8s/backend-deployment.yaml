apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: jfrog
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: backend:v1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000